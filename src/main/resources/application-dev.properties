# Dev mode without Docker: in-memory H2 instead of PostgreSQL.
# For PostgreSQL locally: start Docker Desktop, run `docker compose up -d`, then
#   ./mvnw quarkus:dev -Dquarkus.profile=prod
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:weatherdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=
